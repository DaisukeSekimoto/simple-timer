<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>Simple Timer</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app" aria-labelledby="app-title">
      <header class="app-header">
        <div>
          <h1 id="app-title">Simple Timer</h1>
          <p id="status-text" class="status-text" aria-live="polite">待機中</p>
        </div>
        <div class="window-actions">
          <button id="minimize-button" class="icon-button minimize-button" type="button" aria-label="最小化" title="最小化">
            <span aria-hidden="true">−</span>
          </button>
          <button id="popup-button" class="icon-button" type="button" aria-label="小窓で開く" title="小窓で開く">
            <span aria-hidden="true">□</span>
          </button>
        </div>
      </header>

      <section class="timer-panel" aria-label="タイマー">
        <div class="mode-tabs" role="tablist" aria-label="モード">
          <button id="countdown-tab" class="mode-tab is-active" type="button" role="tab" aria-selected="true" data-mode="countdown">
            カウントダウン
          </button>
          <button id="stopwatch-tab" class="mode-tab" type="button" role="tab" aria-selected="false" data-mode="stopwatch">
            ストップウォッチ
          </button>
        </div>

        <div id="time-display" class="time-display" aria-live="off">00:25:00</div>
        <div id="finish-flash" class="finish-flash" aria-hidden="true"></div>

        <form id="timer-form" class="timer-form">
          <label class="task-field">
            <span>タスク名</span>
            <input id="task-input" type="text" autocomplete="off" maxlength="80" placeholder="日報に残す作業名">
          </label>

          <fieldset id="countdown-settings" class="countdown-settings">
            <legend>時間設定</legend>
            <div class="time-inputs">
              <label>
                <span>時</span>
                <input id="hours-input" type="number" inputmode="numeric" min="0" max="99" step="1" value="0">
              </label>
              <label>
                <span>分</span>
                <input id="minutes-input" type="number" inputmode="numeric" min="0" max="59" step="1" value="25">
              </label>
              <label>
                <span>秒</span>
                <input id="seconds-input" type="number" inputmode="numeric" min="0" max="59" step="1" value="0">
              </label>
            </div>
            <div class="preset-row" aria-label="プリセット">
              <button type="button" class="preset-button" data-seconds="300">5分</button>
              <button type="button" class="preset-button" data-seconds="900">15分</button>
              <button type="button" class="preset-button" data-seconds="1500">25分</button>
              <button type="button" class="preset-button" data-seconds="3000">50分</button>
            </div>
          </fieldset>
        </form>

        <div class="control-row">
          <button id="start-pause-button" class="primary-button" type="button">開始</button>
          <button id="reset-button" class="secondary-button" type="button">リセット</button>
          <button id="copy-button" class="secondary-button" type="button">コピー</button>
        </div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
